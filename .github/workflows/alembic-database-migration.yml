name: CI/CD Pipeline (DB Migration)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "migrations/**"
  pull_request:
    branches: [main]
    paths:
      - "migrations/**"

jobs:
  alembic:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync

      - name: Preview Changes
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |

          echo "=== Kiểm tra phiên bản hiện tại ==="
          doppler run -p 20206205tech -c prod -- uv run alembic current

          echo "=== Lịch sử Migration ==="
          doppler run -p 20206205tech -c prod -- uv run alembic history

          echo "=== Các thay đổi chưa áp dụng ==="
          doppler run -p 20206205tech -c prod -- uv run alembic history -r current:head

      - name: Apply Changes
        if: github.ref == 'refs/heads/main'
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |

          doppler run -p 20206205tech -c prod -- uv run alembic upgrade head
