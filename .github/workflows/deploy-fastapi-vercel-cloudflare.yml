name: Deploy FastAPI to Vercel + Cloudflare DNS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  install-deps:
    runs-on: ubuntu-latest
    outputs:
      deps-cache-key: ${{ steps.cache-key.outputs.CACHE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Calculate cache key
        id: cache-key
        run: |
          echo "CACHE_KEY=deps-uv-${{ hashFiles('uv.lock') }}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: uv sync --frozen

